<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Task Manager with Gemini AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=M+PLUS+Rounded+1c:wght@700&display=swap');
        
        body {
            font-family: 'Inter', 'M PLUS Rounded 1c', 'sans-serif';
            background-color: #f0f4f8;
        }

        .task-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .level-up-anim {
            animation: level-up 0.5s ease-out;
        }

        @keyframes level-up {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #eab308; }
            100% { transform: scale(1); }
        }

        .coin-pop {
            position: absolute;
            animation: coin-fly 0.8s ease-out forwards;
            pointer-events: none;
            color: #eab308;
            font-weight: bold;
            z-index: 50;
        }

        @keyframes coin-fly {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <!-- Dashboard / Rewards Header -->
        <header class="mb-8 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative z-10">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <div id="level-circle" class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl font-bold border-4 border-blue-100 shadow-inner">
                            1
                        </div>
                        <span class="absolute -bottom-1 -right-1 bg-yellow-400 text-[10px] px-1.5 py-0.5 rounded-full font-bold shadow-sm">LV</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-800">プレイヤー・ステータス</h1>
                        <div class="w-48 h-3 bg-slate-100 rounded-full mt-2 overflow-hidden">
                            <div id="exp-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Experience Points</p>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <div class="flex gap-6">
                        <div class="text-center">
                            <span class="block text-2xl text-yellow-500">🪙</span>
                            <span id="coin-total" class="text-xl font-bold text-slate-700">0</span>
                            <p class="text-[10px] text-slate-400 uppercase">報酬コイン</p>
                        </div>
                        <div class="text-center">
                            <span class="block text-2xl text-blue-500">🏆</span>
                            <span id="total-completed" class="text-xl font-bold text-slate-700">0</span>
                            <p class="text-[10px] text-slate-400 uppercase">完了数</p>
                        </div>
                    </div>
                    <button id="ai-cheer-btn" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-full border border-blue-100 hover:bg-blue-100 transition-all">
                        ✨ AIに励ましてもらう
                    </button>
                </div>
            </div>
            
            <!-- AI Cheer Message -->
            <div id="ai-cheer-box" class="hidden mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100 text-sm text-blue-800 italic relative">
                <span id="ai-cheer-text"></span>
                <button onclick="this.parentElement.classList.add('hidden')" class="absolute top-2 right-2 text-blue-300 hover:text-blue-500">×</button>
            </div>
        </header>

        <!-- Input Section -->
        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
            <div class="flex flex-col gap-4">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center justify-between">
                    <span><span class="text-blue-500 mr-2">●</span> クエスト発行</span>
                </h2>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="task-input" placeholder="新しいタスクを入力..." 
                        class="flex-1 p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50">
                    <select id="category-input" class="p-3 rounded-xl border border-slate-200 bg-white focus:outline-none font-medium">
                        <option value="work">仕事 (+10c)</option>
                        <option value="personal">個人 (+5c)</option>
                        <option value="urgent">緊急 (+20c)</option>
                    </select>
                    <button id="add-btn" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg">
                        追加
                    </button>
                </div>
            </div>
        </section>

        <!-- Task List Container -->
        <section>
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-lg font-bold text-slate-700">アクティブ・クエスト</h2>
                <button id="clear-completed" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors bg-white px-3 py-1 rounded-full border border-slate-200">
                    完了済みを整理
                </button>
            </div>
            
            <div id="task-list" class="grid gap-4">
                <!-- Tasks will be injected here -->
            </div>
            
            <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <div class="text-slate-200 mb-4 text-7xl">⚔️</div>
                <p class="text-slate-500 font-medium">現在、受けているクエストはありません。</p>
            </div>
        </section>
    </div>

    <!-- Modal for AI Guide -->
    <div id="ai-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-2 flex items-center gap-2">
                ✨ クエスト攻略ガイド
            </h3>
            <p id="ai-modal-task" class="text-sm text-slate-500 mb-4 pb-2 border-b"></p>
            <div id="ai-modal-content" class="text-slate-700 leading-relaxed text-sm whitespace-pre-wrap max-h-96 overflow-y-auto pr-2">
                <!-- AI content -->
            </div>
            <button onclick="closeModal()" class="w-full mt-6 bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <!-- Notification system -->
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-50"></div>

    <script>
        const apiKey = ""; // Provided at runtime

        // State
        let tasks = [];
        let playerStats = {
            level: 1,
            exp: 0,
            coins: 0,
            totalCompleted: 0
        };

        const CATEGORY_REWARDS = {
            work: { coins: 10, exp: 20 },
            personal: { coins: 5, exp: 10 },
            urgent: { coins: 20, exp: 40 }
        };

        const PRAISES = [
            "素晴らしい！", "その調子！", "完璧だね！", "クエスト達成！", "ナイスワーク！", "圧倒的成長！"
        ];

        // Elements
        const taskInput = document.getElementById('task-input');
        const categoryInput = document.getElementById('category-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const emptyState = document.getElementById('empty-state');
        const clearCompletedBtn = document.getElementById('clear-completed');
        
        const levelCircle = document.getElementById('level-circle');
        const expBar = document.getElementById('exp-bar');
        const coinTotal = document.getElementById('coin-total');
        const totalCompleted = document.getElementById('total-completed');
        
        const aiCheerBtn = document.getElementById('ai-cheer-btn');
        const aiCheerBox = document.getElementById('ai-cheer-box');
        const aiCheerText = document.getElementById('ai-cheer-text');

        // Gemini API Utility
        async function callGemini(prompt, systemPrompt = "あなたはユーザーを励ます有能なRPGのギルドマスターです。") {
            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "申し訳ありません。ギルドマスターは現在不在のようです。";
                } catch (error) {
                    retries++;
                    if (retries === 5) throw error;
                    await new Promise(r => setTimeout(r, delays[retries-1]));
                }
            }
        }

        function updateUI() {
            coinTotal.textContent = playerStats.coins.toLocaleString();
            totalCompleted.textContent = playerStats.totalCompleted;
            levelCircle.textContent = playerStats.level;
            expBar.style.width = `${playerStats.exp}%`;
            
            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
        }

        function showRewardToast(coins, exp) {
            const praise = PRAISES[Math.floor(Math.random() * PRAISES.length)];
            const toast = document.createElement('div');
            toast.className = 'bg-white border-2 border-yellow-400 px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-bounce';
            toast.innerHTML = `
                <span class="font-bold text-slate-800">${praise}</span>
                <span class="text-yellow-600 font-bold">🪙+${coins}</span>
                <span class="text-blue-500 font-bold">✨+${exp}</span>
            `;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 2500);
        }

        function handleReward(category) {
            const reward = CATEGORY_REWARDS[category];
            playerStats.coins += reward.coins;
            playerStats.exp += reward.exp;
            playerStats.totalCompleted += 1;

            if (playerStats.exp >= 100) {
                playerStats.level += 1;
                playerStats.exp = playerStats.exp - 100;
                levelCircle.classList.add('level-up-anim');
                setTimeout(() => levelCircle.classList.remove('level-up-anim'), 600);
            }

            showRewardToast(reward.coins, reward.exp);
            updateUI();
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = `task-card bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between gap-4 relative overflow-hidden shadow-sm ${task.completed ? 'bg-slate-50' : ''}`;
                
                const categoryClasses = {
                    work: 'text-blue-600 bg-blue-50',
                    personal: 'text-purple-600 bg-purple-50',
                    urgent: 'text-red-600 bg-red-50'
                };
                const categoryName = { work: '仕事', personal: '個人', urgent: '緊急' };

                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <div class="relative flex items-center justify-center">
                            <input type="checkbox" ${task.completed ? 'checked disabled' : ''} 
                                class="w-7 h-7 rounded-full border-2 border-slate-300 text-green-500 focus:ring-green-500 cursor-pointer appearance-none checked:bg-green-500 checked:border-green-500 transition-all flex items-center justify-center"
                                onclick="completeTask(${index}, event)">
                            ${task.completed ? '<span class="absolute text-white pointer-events-none text-xs">✔</span>' : ''}
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-700 ${task.completed ? 'completed' : ''}">${task.text}</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] w-fit px-2 py-0.5 rounded-md font-bold uppercase ${categoryClasses[task.category]}">
                                    ${categoryName[task.category]} 🪙${CATEGORY_REWARDS[task.category].coins}
                                </span>
                                ${!task.completed ? `
                                    <button onclick="getTaskAiGuide(${index})" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 transition-colors">
                                        ✨ AIガイド
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-slate-300 hover:text-red-400 p-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                taskList.appendChild(div);
            });
            updateUI();
        }

        // AI Interaction Logic
        window.getTaskAiGuide = async function(index) {
            const task = tasks[index];
            const modal = document.getElementById('ai-modal');
            const modalContent = document.getElementById('ai-modal-content');
            const modalTask = document.getElementById('ai-modal-task');

            modalTask.textContent = `クエスト: ${task.text}`;
            modalContent.innerHTML = `<div class="flex items-center justify-center p-8"><div class="spinner border-blue-500"></div> AIが攻略ルートを計算中...</div>`;
            modal.classList.remove('hidden');

            const prompt = `タスク「${task.text}」を完了するための3つのステップを、RPGの冒険者へのアドバイス風に日本語で教えてください。`;
            const systemPrompt = "あなたはファンタジーRPGの賢者です。実用的なアドバイスを冒険の準備に見立てて簡潔に説明してください。";

            try {
                const guide = await callGemini(prompt, systemPrompt);
                modalContent.textContent = guide;
            } catch (e) {
                modalContent.textContent = "魔力が不足しているようです...。後でもう一度お試しください。";
            }
        };

        window.closeModal = function() {
            document.getElementById('ai-modal').classList.add('hidden');
        };

        aiCheerBtn.addEventListener('click', async () => {
            aiCheerBox.classList.remove('hidden');
            aiCheerText.innerHTML = `<div class="spinner"></div> 言葉を紡いでいます...`;
            
            const prompt = `レベル${playerStats.level}、今までの完了数${playerStats.totalCompleted}のプレイヤーに、RPGのギルドマスターとして短い一言でモチベーションを上げてください。`;
            
            try {
                const cheer = await callGemini(prompt);
                aiCheerText.textContent = cheer;
            } catch (e) {
                aiCheerText.textContent = "冒険は一歩一歩の積み重ねだ。焦ることはない。";
            }
        });

        // Task Management
        window.completeTask = function(index, event) {
            if (tasks[index].completed) return;
            const rect = event.target.getBoundingClientRect();
            for(let i=0; i<5; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin-pop';
                coin.innerHTML = '🪙';
                coin.style.left = `${rect.left + window.scrollX}px`;
                coin.style.top = `${rect.top + window.scrollY}px`;
                coin.style.fontSize = `${Math.random() * 10 + 15}px`;
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 800);
            }
            tasks[index].completed = true;
            handleReward(tasks[index].category);
            renderTasks();
        };

        window.deleteTask = function(index) {
            tasks.splice(index, 1);
            renderTasks();
        };

        addBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (!text) return;
            tasks.push({ text, category: categoryInput.value, completed: false, id: Date.now() });
            taskInput.value = '';
            renderTasks();
        });

        taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBtn.click(); });
        clearCompletedBtn.addEventListener('click', () => { tasks = tasks.filter(t => !t.completed); renderTasks(); });

        updateUI();
    </script>
</body>
</html>
